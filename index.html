
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互動題庫測驗</title>
<style>
body { 
  font-family: Arial, sans-serif; 
  margin: 10px; 
  font-size: 24px;   /* 原本大約 16px，改成 1.5 倍 */
}

.option { 
  margin: 15px 0; 
  padding: 12px;     /* 原本 8px，改成 1.5 倍 */
  border: 3px solid #ccc; 
  border-radius: 8px; 
  cursor: pointer; 
  font-size: 22px;   /* 選項文字加大 1.5 倍 */
}

.selected { 
  border-color: blue; 
  background-color: #e6f0ff; 
}

.correct { 
  border-color: green; 
  background-color: #e6ffe6; 
}

.incorrect { 
  border-color: red; 
  background-color: #ffe6e6; 
}

.option img { 
  max-width: 300px;  /* 原本 200px，改成 1.5 倍 */
  display: block; 
  margin-top: 8px; 
}

#timer { 
  font-size: 27px;   /* 原本 18px，改成 1.5 倍 */
  color: red; 
  margin-bottom: 15px; 
}

button { 
  margin: 15px; 
  padding: 12px 24px; /* 原本 8px 16px，改成 1.5 倍 */
  font-size: 22px;    /* 按鈕文字加大 1.5 倍 */
}
</style>
<script>
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
    return array;
}

let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

function toggleFavorite(qid){
    if(favorites.includes(qid)){
        favorites = favorites.filter(id=>id!=qid);
    }else{
        favorites.push(qid);
    }
    localStorage.setItem("favorites",JSON.stringify(favorites));
    alert("收藏清單已更新");
}

function clearFavorites(){
    favorites = [];
    localStorage.setItem("favorites", JSON.stringify(favorites));
    alert("收藏題目已清空");
}

function showFavorites(){
    let favQuestions = allQuestions.filter(q=>favorites.includes(q.qid));
    let listHTML="<h2>收藏題目清單</h2>";
    if(favQuestions.length==0){
        listHTML+="<p>目前沒有收藏題目</p>";
    }else{
        favQuestions.forEach(q=>{
            let div="<p><b>"+q.qid+".</b> "+q.text+"</p>";
            if(q.images && q.images.length>0){
                q.images.forEach(imgPath=>{
                    div+="<img src='"+imgPath+"' style='max-width:300px'>";
                });
            }
            q.options.forEach((opt,i)=>{
                let cls="option";
                if(i+1==q.answer){ cls+=" correct"; }
                let content=opt.text;
                if(opt.img) content+="<br><img src='"+opt.img+"' style='max-width:200px'>";
                div+="<div class='"+cls+"'>"+content+"</div>";
            });
            listHTML+=div;
        });
    }
    listHTML+="<br><button onclick='location.reload()'>回到首頁</button>";
    document.getElementById("quiz").innerHTML=listHTML;
    document.getElementById("menu").style.display="none";
}

let questions = [];
let current = 0;
let answers = {};
let timer = 18*60;
let timerInterval;

function startQuiz(group){
    document.getElementById("menu").style.display="none";
    if(group=="random"){
        questions = allQuestions.sort(()=>Math.random()-0.5).slice(0,50);
    }else{
        let start=(group-1)*50;
        questions = allQuestions.slice(start,start+50);
    }
    showQuestion(0);
    startTimer();
}

function startFavoritesQuiz(num){
    document.getElementById("menu").style.display="none";
    let favQuestions = allQuestions.filter(q=>favorites.includes(q.qid));
    if(num > favQuestions.length){ num = favQuestions.length; }
    favQuestions = shuffle(favQuestions).slice(0,num);
    questions = favQuestions;
    showQuestion(0);
    startTimer();
}

function showQuestion(n){
    document.getElementById("quiz").innerHTML="";
    let q = questions[n];
    let div = document.createElement("div");
    div.className = "question";
    div.innerHTML = "<p><b>"+q.qid+".</b> "+q.text+"</p>";

    if(q.images && q.images.length > 0){
        q.images.forEach(imgPath=>{
            let img = document.createElement("img");
            img.src = imgPath;
            img.style.maxWidth = "300px";
            div.appendChild(img);
        });
    }

    // 打亂選項
    let shuffledOptions = shuffle([...q.options]);
    q.shuffledOptions = shuffledOptions;

    // 找出正確答案在打亂後的新位置
    let correctIndex = shuffledOptions.findIndex((opt,i)=> (i+1) == q.answer);
    q.correctIndex = correctIndex + 1; // 存成 1-based

    shuffledOptions.forEach((opt,i)=>{
        let odiv = document.createElement("div");
        odiv.className = "option";
        if(opt.text) odiv.innerText = opt.text;
        if(opt.img){
            let imgTag = document.createElement("img");
            imgTag.src = opt.img;
            imgTag.style.maxWidth = "200px";
            odiv.appendChild(imgTag);
        }
        if(answers[n] == i+1) odiv.classList.add("selected");
        odiv.addEventListener("click",()=>{
            div.querySelectorAll(".option").forEach(opt=>opt.classList.remove("selected"));
            odiv.classList.add("selected");
            answers[n] = i+1;
        });
        div.appendChild(odiv);
    });

    // 收藏按鈕
    let favBtn = document.createElement("button");
    favBtn.innerText = favorites.includes(q.qid) ? "取消收藏" : "收藏題目";
    favBtn.onclick = ()=>{
        toggleFavorite(q.qid);
        favBtn.innerText = favorites.includes(q.qid) ? "取消收藏" : "收藏題目";
    };
    div.appendChild(favBtn);

    // 導覽按鈕
    let nav = document.createElement("div");
    nav.innerHTML = "<br>";
    if(current > 0){
        let prevBtn = document.createElement("button");
        prevBtn.innerText = "上一題";
        prevBtn.onclick = prevQuestion;
        nav.appendChild(prevBtn);
    }
    if(current < questions.length-1){
        let nextBtn = document.createElement("button");
        nextBtn.innerText = "下一題";
        nextBtn.onclick = nextQuestion;
        nav.appendChild(nextBtn);
    }
    let homeBtn = document.createElement("button");
    homeBtn.innerText = "回到首頁";
    homeBtn.onclick = ()=>{location.reload();};
    nav.appendChild(homeBtn);

    div.appendChild(nav);
    document.getElementById("quiz").appendChild(div);
}

function prevQuestion(){ if(current>0){ current--; showQuestion(current); } }
function nextQuestion(){ if(current<questions.length-1){ current++; showQuestion(current); } }

function submitQuiz(){
    clearInterval(timerInterval);
    let score = 0, correctCount = 0, wrongCount = 0;
    let resultHTML = "<h2>測驗結果</h2>";

    questions.forEach((q,n)=>{
        let div = "<p><b>"+q.qid+".</b> "+(q.text || "")+"</p>";

        q.shuffledOptions.forEach((opt,i)=>{
            let cls = "option";
            if(i+1 == q.correctIndex){
                cls += " correct";
            } else if(i+1 == answers[n] && answers[n] != q.correctIndex){
                cls += " incorrect";
            } else if(i+1 == answers[n]){
                cls += " selected";
            }
            let content = opt.text || "";
            if(opt.img) content += "<br><img src='"+opt.img+"' style='max-width:200px'>";
            div += "<div class='"+cls+"'>"+content+"</div>";
        });

        if (answers[n] === q.correctIndex) {
            score += 2;
            correctCount++;
        } else if (answers[n] !== undefined) {
            wrongCount++;
            if (!favorites.includes(q.qid)) {
                favorites.push(q.qid);
            }
        }

        resultHTML += div;
    });

    localStorage.setItem("favorites", JSON.stringify(favorites));
    resultHTML = "<h2>測驗結果</h2><p>得分: "+score+"/"+(questions.length*2)+"</p>"+
                 "<p>答對題數: "+correctCount+"</p>"+
                 "<p>答錯題數: "+wrongCount+"</p>"+resultHTML;
    resultHTML += "<br><button onclick='location.reload()'>回到首頁</button>";
    document.getElementById("quiz").innerHTML = resultHTML;
}

function startTimer(){
    timerInterval=setInterval(()=>{
        timer--;
        let min=Math.floor(timer/60);
        let sec=("0"+(timer%60)).slice(-2);
        document.getElementById("timer").innerText="剩餘時間: "+min+":"+sec;
        if(timer<=0){
            clearInterval(timerInterval);
            submitQuiz();
        }
    },1000);
}
</script>


</head>

{"qid": 296, "text": "小貨車因業務需求必須附載隨車作業人員時，其人數規定為何？", "images": [], "options": [{"text": "包含駕駛人在內，最多不得超過4人。", "img": ""}, {"text": "車廂內有多寬，即可乘坐多少人。", "img": ""}, {"text": "除駕駛人外，不得超過2人。", "img": ""}], "answer": "3"},
{"qid": 297, "text": "關於高速公路與快速公路之交通事故，各自由何單位全權負責處理？", "images": [], "options": [{"text": "兩者皆統一由內政部警政署國道公路警察局處理。", "img": ""}, {"text": "高速公路由國道公路警察局處理；快速公路則由所轄縣、市政府警察機關或警政署指定機關處理。", "img": ""}, {"text": "皆由當地縣、市政府警察機關處理。", "img": ""}], "answer": "2"},

{"qid": 300, "text": "為達到環保及節能減碳之駕駛習慣，開車時應儘量避免下列何種駕駛行為以減少油耗？", "images": [], "options": [{"text": "尖峰時間通過車多、壅塞路線，且頻繁加減速。", "img": ""}, {"text": "提早規劃路線，避開擁擠路段並保持勻速行駛。", "img": ""}, {"text": "適當使用引擎煞車代替頻繁踩踏腳煞車。", "img": ""}], "answer": "1"},
{"qid": 301, "text": "關於車輛配備之「自動駕駛輔助系統」，下列敘述何者正確？", "images": [], "options": [{"text": "加入自動駕駛輔助功能之主要目的，是協助駕駛人在行駛過程中提高行車安全。", "img": ""}, {"text": "啟用後即可完全取代駕駛人判斷，駕駛人無須再注意路況。", "img": ""}, {"text": "啟用後即可不受道路速限與號誌指示拘束，由車輛自主判斷。", "img": ""}], "answer": "1"},
{"qid": 302, "text": "汽車駕駛人行至有燈光號誌管制之交岔路口闖紅燈，並因而肇事致人重傷時，關於駕駛執照處分下列何者正確？", "images": [], "options": [{"text": "無須另為駕駛執照處分。", "img": ""}, {"text": "除依闖紅燈規定處罰外，並吊扣其駕駛執照3個月至6個月。", "img": ""}, {"text": "一律吊銷其駕駛執照，並終身不得再考領。", "img": ""}], "answer": "2"},
{"qid": 303, "text": "汽車行駛涉水路段後，對於煞車系統有何影響？", "images": [], "options": [{"text": "水會沖去煞車皮髒污，故煞車效能更佳。", "img": ""}, {"text": "煞車效能不變，無須特別注意。", "img": ""}, {"text": "水分會使煞車來令片與煞車盤間產生水膜，導致煞車效能大幅降低，應在安全狀況下輕踩煞車以摩擦生熱排除水分。", "img": ""}], "answer": "3"},
{"qid": 304, "text": "關於領有學習駕駛證之學員，其道路駕駛規定何者正確？", "images": [], "options": [{"text": "學習駕駛證可暫時充當駕駛執照，學員得隨時單獨開車上路，警察依法不得取締。", "img": ""}, {"text": "必須在有駕照的駕駛者或駕訓班合格教練陪同下，依規定之指定路線及時間內始得進行道路駕駛學習。", "img": ""}, {"text": "只要有合格駕駛執照的人陪同，即可開車上高速公路練習。", "img": ""}], "answer": "2"},

{"qid": 307, "text": "關於汽車駕駛行為與油耗、廢氣排放的關係，下列敘述何者錯誤？", "images": [], "options": [{"text": "頻繁急加減速不僅危險，更是造成高油耗的主因。", "img": ""}, {"text": "急加減速次數愈多，排放的廢氣污染會愈嚴重。", "img": ""}, {"text": "只要車輛保養得宜，不論加減速多頻繁都不會影響廢氣排放量。", "img": ""}], "answer": "3"},
{"qid": 308, "text": "小客車駕駛人附載幼童行駛於市區一般道路時，若未依規定將幼童安置於兒童安全椅上，下列何者為正確處分？", "images": [], "options": [{"text": "處新臺幣600～1,200元罰鍰，並記違規點數1點。", "img": ""}, {"text": "處新臺幣1,500～3,000元罰鍰。", "img": ""}, {"text": "處新臺幣3,000～6,000元罰鍰，並吊扣駕駛執照1個月。", "img": ""}], "answer": "2"},
{"qid": 309, "text": "關於汽車車速與駕駛人視野的關係，下列敘述何者正確？", "images": [], "options": [{"text": "車速愈快，駕駛人的視野愈大，兩邊景物愈易看清。", "img": ""}, {"text": "車速愈快，駕駛人的可見視野會越狹窄，周邊物體容易模糊。", "img": ""}, {"text": "視野大小僅與擋風玻璃大小有關，與車速毫無關係。", "img": ""}], "answer": "2"},
{"qid": 310, "text": "駕駛人駕車行經設有行人穿越道之路口，發現有行人正準備穿越時，下列處置何者正確？", "images": [], "options": [{"text": "應在行人穿越道前停讓行人優先通行，待行人安全通過後再起步。", "img": ""}, {"text": "預判行人通過速度後加速通過，以減少對後方車流之影響。", "img": ""}, {"text": "鳴按喇叭警示行人退讓，俟車輛通過後行人再行穿越。", "img": ""}], "answer": "1"},

{"qid": 313, "text": "駕駛人駕車進入道路施工路段，前方設有施工警告標誌及交通錐排列縮減車道，下列駕駛行為何者正確？", "images": [], "options": [{"text": "提前依指示變換車道，並依施工區公告速限減速通過，注意施工人員動態。", "img": ""}, {"text": "確認後方無車時，可由原車道直接加速通過縮減段。", "img": ""}, {"text": "跨越交通錐至原本封閉車道行駛，可避開壅塞車流。", "img": ""}], "answer": "1"},
{"qid": 314, "text": "駕駛人欲建立安全的用路習慣，下列何項做法最為適當？", "images": [], "options": [{"text": "全程遵守交通規則，不因路況順暢、車流稀少或時間緊迫而違規。", "img": ""}, {"text": "視當下狀況彈性調整，例如深夜無車時可不停紅燈以節省時間。", "img": ""}, {"text": "路口無監視器時可加速通過，以提升通勤效率。", "img": ""}], "answer": "1"},
{"qid": 315, "text": "駕駛人駕車於市區道路行駛時，前方路旁停有大型車輛或設有施工圍籬，導致視線受遮蔽而無法看清前方狀況時，下列駕駛行為何者最為正確？", "images": [], "options": [{"text": "應降低車速並保持高度警覺，預防有行人、機車或自行車自遮蔽物後方突然出現，以保留足夠之反應距離與煞車時間。", "img": ""}, {"text": "應儘量靠近遮蔽物緩慢通過，藉以縮小視線死角範圍並擴大觀察視角，待確認遮蔽物後方無來人或車輛後再加速駛離。", "img": ""}, {"text": "因己方行駛於主車道具優先路權，自遮蔽物後方出現之人或車應主動注意主車道車流，駕駛人只要維持原速並隨時準備煞車即可。", "img": ""}], "answer": "1"},
{"qid": 316, "text": "根據國際OECD研究，汽車與行人、機車或自行車發生碰撞時，當撞擊速度由時速30公里提高至時速50公里，被撞用路人之死亡機率變化為何？", "images": [], "options": [{"text": "由約10%增加至約30%，速度增加之影響呈線性比例。", "img": ""}, {"text": "由約10%大幅增加至約80%，速度增加之影響呈非線性陡升。", "img": ""}, {"text": "由約20%增加至約50%，速度增加之影響相對溫和。", "img": ""}], "answer": "2"},

{"qid": 318, "text": "駕駛人因塞車，發現前方路口號誌已轉為黃燈，此時最適當的做法是：", "images": [], "options": [{"text": "評估已接近停止線且車速較快，不易安全煞停，因此加速通過。", "img": ""}, {"text": "仍應減速停車等候下一個綠燈。", "img": ""}, {"text": "切換至旁邊車道加速通過，以減少路口滯留時間。", "img": ""}], "answer": "2"},
{"qid": 319, "text": "行車中發現後方車輛持續逼近且頻繁閃燈催促，此時最適當的做法是：", "images": [], "options": [{"text": "適當減速，靠右讓出車道，讓後車先行通過。", "img": ""}, {"text": "加速拉開與後車的距離，以維護行車安全。", "img": ""}, {"text": "維持原速不予理會，避免助長對方逼車行為。", "img": ""}], "answer": "1"},

{"qid": 337, "text": "癲癇疾病患者，檢具醫療院所醫師出具最近二年以上未發作診斷證明書者：", "images": [], "options": [{"text": "得參加駕駛執照考驗。", "img": ""}, {"text": "不可參加普通駕駛執照考驗。", "img": ""}, {"text": "沒有特別規定。", "img": ""}], "answer": "1"},
{"qid": 338, "text": "臨時停車停止時間：", "images": [], "options": [{"text": "未滿3分鐘。", "img": ""}, {"text": "未滿5分鐘。", "img": ""}, {"text": "未滿10分鐘。", "img": ""}], "answer": "1"},
{"qid": 339, "text": "汽車車廂以外：", "images": [], "options": [{"text": "不得載人。", "img": ""}, {"text": "可以載人。", "img": ""}, {"text": "沒有限制。", "img": ""}], "answer": "1"},
{"qid": 340, "text": "汽車載運乘客：", "images": [], "options": [{"text": "不得超過核定人數。", "img": ""}, {"text": "視需要來決定。", "img": ""}, {"text": "沒有規定或限制。", "img": ""}], "answer": "1"},
{"qid": 341, "text": "汽車駕駛人駕車，違反道路交通安全規則，因而肇事致人死亡者：", "images": [], "options": [{"text": "吊扣行車執照。", "img": ""}, {"text": "吊扣駕駛執照。", "img": ""}, {"text": "吊銷駕駛執照。", "img": ""}], "answer": "3"},
{"qid": 342, "text": "汽車駕駛人駕駛汽車肇事，雖無人受傷或死亡，卻未依規定處置且逃逸者，除處罰鍰外，並：", "images": [], "options": [{"text": "吊扣行車執照。", "img": ""}, {"text": "吊扣駕駛執照。", "img": ""}, {"text": "吊銷駕駛執照。", "img": ""}], "answer": "2"},
{"qid": 343, "text": "駕駛人不在未劃分標線道路之中央右側駕車者，應處：", "images": [], "options": [{"text": "吊扣駕駛執照。", "img": ""}, {"text": "罰鍰。", "img": ""}, {"text": "吊扣行車執照。", "img": ""}], "answer": "2"},
{"qid": 344, "text": "消防栓、消防車出入口，多少距離以內不得臨時停車：", "images": [], "options": [{"text": "10公尺。", "img": ""}, {"text": "5公尺。", "img": ""}, {"text": "15公尺。", "img": ""}], "answer": "2"},
{"qid": 345, "text": "汽車駛近學校、醫院等處時：", "images": [], "options": [{"text": "多按鳴喇叭，使學生或病人等注意。", "img": ""}, {"text": "除遇有緊急或危險情況外，不得按鳴喇叭。", "img": ""}, {"text": "只能按喇叭 1短聲。", "img": ""}], "answer": "2"},
{"qid": 346, "text": "汽車行經設有學校、醫院標誌之路段，應該：", "images": [], "options": [{"text": "減速慢行，作隨時停車之準備。", "img": ""}, {"text": "多按鳴喇叭，使行人注意。", "img": ""}, {"text": "加速通過，以免人車擁塞。", "img": ""}], "answer": "1"},
{"qid": 347, "text": "在市區交通頻繁之道路：", "images": [], "options": [{"text": "按鳴喇叭兩長聲後，可以超車。", "img": ""}, {"text": "按鳴喇叭兩短聲後，可以超車。", "img": ""}, {"text": "不可按鳴喇叭或超車。", "img": ""}], "answer": "3"},
{"qid": 348, "text": "領有臨時牌照之車輛：", "images": [], "options": [{"text": "不得載運客貨收費營業。", "img": ""}, {"text": "可以載貨營業。", "img": ""}, {"text": "無規定。", "img": ""}], "answer": "1"},
{"qid": 349, "text": "前行車駕駛人聞後行車超車之喇叭聲，如車前路況無障礙時：", "images": [], "options": [{"text": "應減速靠邊或表示允讓。", "img": ""}, {"text": "不必避讓。", "img": ""}, {"text": "加速行駛。", "img": ""}], "answer": "1"},
{"qid": 350, "text": "聞有消防車、救護車、警備車、工程救險車、毒性化學物質災害事故應變車等之警號時，不論來自何方，應：", "images": [], "options": [{"text": "立即避讓。", "img": ""}, {"text": "不須避讓。", "img": ""}, {"text": "只要不跨線行駛，就不必避讓。", "img": ""}], "answer": "1"},
{"qid": 351, "text": "鐵路平交道遮斷器未放下，或看守人員未表示停止時，應該：", "images": [], "options": [{"text": "仍應看、聽鐵路兩端確無火車駛來，始得通過。", "img": ""}, {"text": "加速通過。", "img": ""}, {"text": "俟看守人表示後通過。", "img": ""}], "answer": "1"},
{"qid": 352, "text": "報廢之車輛：", "images": [], "options": [{"text": "不得再行申請登檢領照使用。", "img": ""}, {"text": "修復後可申請登檢領照。", "img": ""}, {"text": "無規定。", "img": ""}], "answer": "1"},
{"qid": 353, "text": "使用偽造、變造、或矇領之牌照者，應處：", "images": [], "options": [{"text": "罰鍰並禁止其行駛。", "img": ""}, {"text": "扣繳牌照。", "img": ""}, {"text": "罰鍰，扣繳牌照並當場移置保管該汽車。", "img": ""}], "answer": "3"},
{"qid": 354, "text": "汽車駕駛人有下列情形之一者，應施以道路交通安全講習：", "images": [], "options": [{"text": "闖越鐵路平交道。", "img": ""}, {"text": "於交岔路口10公尺內臨時停車。", "img": ""}, {"text": "變換車道時，未注意安全距離。", "img": ""}], "answer": "1"},
{"qid": 355, "text": "領有牌照之自用小客車，除使用液化石油氣及壓縮天然氣為燃料者外，檢驗次數應為：", "images": [], "options": [{"text": "出廠年份未滿5年者，免定期檢驗；5年以上未滿10年者，每年至少檢驗1次；10年以上者每年至少檢驗2次。", "img": ""}, {"text": "出廠年份10年以上者每年至少檢驗3次。", "img": ""}, {"text": "出廠年份未滿5年者，每年至少檢驗2次。", "img": ""}], "answer": "1"},
{"qid": 356, "text": "小型車駕駛執照吊扣期間駕駛小型車者，除處新臺幣36,000～60,000元罰鍰，並當場移置保管該汽車外，並應：", "images": [], "options": [{"text": "再吊扣其行照。", "img": ""}, {"text": "再吊扣其駕照。", "img": ""}, {"text": "吊銷其駕照。", "img": ""}], "answer": "3"},
{"qid": 357, "text": "於身心障礙專用停車位違規停車者：", "images": [], "options": [{"text": "罰鍰。", "img": ""}, {"text": "吊扣牌照。", "img": ""}, {"text": "勸導。", "img": ""}], "answer": "1"},
{"qid": 358, "text": "牌照借供他車使用或使用他車牌照行駛者，除罰鍰外，並應：", "images": [], "options": [{"text": "吊扣牌照。", "img": ""}, {"text": "吊銷牌照。", "img": ""}, {"text": "沒入車輛。", "img": ""}], "answer": "2"},
{"qid": 359, "text": "汽車駕駛人行駛高速公路、快速公路而不遵守管制規定，經當場舉發之處罰：", "images": [], "options": [{"text": "記點不罰鍰。", "img": ""}, {"text": "罰鍰並違規記點。", "img": ""}, {"text": "罰鍰。", "img": ""}], "answer": "2"},
{"qid": 360, "text": "在鐵路平交道超車、迴車、倒車或停車者，應處以：", "images": [], "options": [{"text": "罰鍰。", "img": ""}, {"text": "罰鍰並違規記點。", "img": ""}, {"text": "罰鍰並吊扣駕照。", "img": ""}], "answer": "3"},
{"qid": 361, "text": "強行闖越鐵路平交道之處罰是：", "images": [], "options": [{"text": "罰鍰並吊扣駕照。", "img": ""}, {"text": "吊銷駕照。", "img": ""}, {"text": "罰鍰。", "img": ""}], "answer": "1"},
{"qid": 362, "text": "汽車駕駛人因違規記點，2年內經吊扣駕駛執照2次，再違反記點規定者，處以：", "images": [], "options": [{"text": "吊扣其駕駛執照。", "img": ""}, {"text": "吊銷其駕駛執照。", "img": ""}, {"text": "罰鍰。", "img": ""}], "answer": "2"},
{"qid": 363, "text": "占用道路之廢棄車輛，經民眾檢舉或由警察機關、環境保護主管機關查報後，由警察機關通知車主限期處理而屆期未清理者：", "images": [], "options": [{"text": "環保機關可移置保管，並可向車主收取費用。", "img": ""}, {"text": "任其占用。", "img": ""}, {"text": "直接銷毀。", "img": ""}], "answer": "1"},
{"qid": 364, "text": "占用道路之廢棄車輛，由環保單位或委託民間單位移置保管，經公告多久無人認領，可依廢 棄物清除：", "images": [], "options": [{"text": "1個月。", "img": ""}, {"text": "2個月。", "img": ""}, {"text": "3個月。", "img": ""}], "answer": "1"},
{"qid": 365, "text": "逕行舉發汽車超速行駛時，其違規地點相距：", "images": [], "options": [{"text": "14公里以上。", "img": ""}, {"text": "8公里以上。", "img": ""}, {"text": "6公里以上。得連續舉發之，但其違規地點在隧道內者，不在此限。", "img": ""}], "answer": "3"},
{"qid": 366, "text": "汽車所有人或汽車駕駛人接獲違反道路交通管理事件通知單後，於", "images": [], "options": [{"text": "10日。", "img": ""}, {"text": "30日。", "img": ""}, {"text": "50日。內得不經裁決，逕依處罰條例第92條第4項之罰鍰基準規定，向指定之處所繳納結案。", "img": ""}], "answer": "2"},
{"qid": 367, "text": "小客車前座或貨車駕駛室乘人超過規定人數者，處汽車駕駛人：", "images": [], "options": [{"text": "吊扣駕照。", "img": ""}, {"text": "罰鍰。", "img": ""}, {"text": "罰鍰並吊扣駕照。", "img": ""}], "answer": "2"},
{"qid": 368, "text": "汽車肇事逃逸案件，經通知汽車所有人到場說明，無故不到場說明，或不提供汽車駕駛人相關資料者：", "images": [], "options": [{"text": "吊銷該汽車牌照。", "img": ""}, {"text": "吊扣該汽車牌照。", "img": ""}, {"text": "吊扣汽車所有人駕照。", "img": ""}], "answer": "2"},
{"qid": 369, "text": "汽車駕駛人，在快車道上依規定行駛，因行人或慢車不依規定，擅自進入快車道，而致人受傷或死亡，依法應負刑事責任者：", "images": [], "options": [{"text": "一樣不變。", "img": ""}, {"text": "減輕其刑。", "img": ""}, {"text": "加重其刑。", "img": ""}], "answer": "2"},
{"qid": 370, "text": "受處分人，如有不服處罰之裁決者，應以原處分機關為被告，逕向管轄之高等行政法院地方行政訴訟庭提起訴訟；其中撤銷訴訟之提起，應於裁決書送達後：", "images": [], "options": [{"text": "10日。", "img": ""}, {"text": "20日。", "img": ""}, {"text": "30日。之不變期間內為之。", "img": ""}], "answer": "3"},
{"qid": 371, "text": "下列何種違規行為得對汽車所有人逕行舉發處罰：", "images": [], "options": [{"text": "無照駕駛。", "img": ""}, {"text": "酒醉駕車。", "img": ""}, {"text": "違規停車而駕駛人不在場。", "img": ""}], "answer": "3"},
{"qid": 372, "text": "拼裝車輛未經核准 領用牌證行駛或報廢車仍行駛道路者，其車輛：", "images": [], "options": [{"text": "沒入之並罰鍰。", "img": ""}, {"text": "公告拍賣之。", "img": ""}, {"text": "繳清罰鍰後始得領回。", "img": ""}], "answer": "1"},
{"qid": 373, "text": "汽車駕駛人無照駕駛大貨車、大客車、聯結車之行為，經舉發後除罰鍰外，並：", "images": [], "options": [{"text": "吊銷牌照。", "img": ""}, {"text": "當場禁止其駕駛。", "img": ""}, {"text": "車輛沒入。", "img": ""}], "answer": "2"},
{"qid": 374, "text": "駕駛汽車行駛於高速公路或快速公路，汽車駕駛人、前座或小型車 後座乘客未繫安全帶者，將處駕駛人罰鍰新臺幣：", "images": [], "options": [{"text": "1,000～ 2,000元。", "img": ""}, {"text": "1,500～3,000元。", "img": ""}, {"text": "3,000～6,000元。", "img": ""}], "answer": "3"},
{"qid": 375, "text": "違規停車經舉發後仍未改正，每逾：", "images": [], "options": [{"text": "1小時。", "img": ""}, {"text": "2小時。", "img": ""}, {"text": "半小時。得連續舉發。", "img": ""}], "answer": "2"},
{"qid": 376, "text": "逕行舉發汽車超速行駛時，其：", "images": [], "options": [{"text": "違規時間相隔4分鐘以上或行駛經過1個路口以上。", "img": ""}, {"text": "違規時間相隔5分鐘以上或行駛經過1個路口以上。", "img": ""}, {"text": "違規地點相距6公里以上、違規時間相隔6分鐘以上或行駛經過1個路口以上。 得連續舉發之。但其違規地點在隧道內者，不在此限。", "img": ""}], "answer": "3"},
{"qid": 377, "text": "汽車駕駛人違規併排停車將處罰鍰新臺幣：", "images": [], "options": [{"text": "1,200元以上3,000元以下。", "img": ""}, {"text": "1,800元以上3,000元以下。", "img": ""}, {"text": "2,400元以上3,000元以下。", "img": ""}], "answer": "2"},
{"qid": 378, "text": "汽車駕駛人無正當理由，不依規定接受道路交通安全講習者，處新臺幣1,800元罰鍰，經再通知依限參加講習，逾期6個月以上仍不參加者，應罰：", "images": [], "options": [{"text": "吊扣行車執照。", "img": ""}, {"text": "吊銷駕駛執照。", "img": ""}, {"text": "吊扣駕駛執照。", "img": ""}], "answer": "3"},
{"qid": 379, "text": "汽車所有人或駕駛人於辦理車輛過戶、停駛、復駛、繳交牌照、註銷牌照、換發牌照或駕駛執照前：", "images": [], "options": [{"text": "應。", "img": ""}, {"text": "不需要。", "img": ""}, {"text": "沒規定。 繳清未結之違規罰鍰。", "img": ""}], "answer": "1"},
{"qid": 380, "text": "高速或快速公路匝道上速度限制每小時為：", "images": [], "options": [{"text": "20公里。", "img": ""}, {"text": "30公里。", "img": ""}, {"text": "應依速限標誌指示。", "img": ""}], "answer": "3"},
{"qid": 381, "text": "在高速公路最高速限每小時90公里以上之路段，行駛速率低於每小時：", "images": [], "options": [{"text": "60公里。", "img": ""}, {"text": "70公里。", "img": ""}, {"text": "80公里。之較慢速小型車，應行駛於外側車道。", "img": ""}], "answer": "3"},
{"qid": 382, "text": "在高速或快速公路同一車道上行駛之小型車輛時速在70公里時，前後兩車間最少距離應為：", "images": [], "options": [{"text": "15公尺。", "img": ""}, {"text": "25公尺。", "img": ""}, {"text": "35公尺。", "img": ""}], "answer": "3"},
{"qid": 383, "text": "大型車輛在高速或快速公路行駛，應在：", "images": [], "options": [{"text": "內側車道行駛。", "img": ""}, {"text": "外側車道行駛。", "img": ""}, {"text": "可以任意在內外側車道行駛。", "img": ""}], "answer": "2"},
{"qid": 384, "text": "汽車在高速或快速公路行駛中：", "images": [], "options": [{"text": "不得利用路肩超車。", "img": ""}, {"text": "可以利用路肩超車。", "img": ""}, {"text": "僅能利用加速車道超車。", "img": ""}], "answer": "1"},
{"qid": 385, "text": "正常天候下，高速或快速公路之最高行車速度限制為：", "images": [], "options": [{"text": "120公里/小時。", "img": ""}, {"text": "110公里/小時。", "img": ""}, {"text": "應依速限標誌指示。", "img": ""}], "answer": "3"},
{"qid": 386, "text": "濃霧、濃煙、大雨、強風，致能見度甚低時在高速或快速公路行駛之車輛時速：", "images": [], "options": [{"text": "應保持最低速度限制60公里以上。", "img": ""}, {"text": "應以低於40 公里行駛或暫停路肩，並顯示危險警告燈。", "img": ""}, {"text": "應維持正常速度行車。", "img": ""}], "answer": "2"},
{"qid": 387, "text": "在單車道之匝道及加減速車道上駕駛車輛：", "images": [], "options": [{"text": "可以超車。", "img": ""}, {"text": "不得超車。", "img": ""}, {"text": "可以暫停行駛。", "img": ""}], "answer": "2"},
{"qid": 388, "text": "在高速或快速公路行車錯過了出口匝道：", "images": [], "options": [{"text": "暫停路旁，等待後方無來車，就可以迴轉下匝道。", "img": ""}, {"text": "繼續往前駛至次一出口。", "img": ""}, {"text": "暫停路旁，等待後方無來車，就可以倒車下匝道。", "img": ""}], "answer": "2"},
{"qid": 389, "text": "梅花型的交通標誌是：", "images": [], "options": [{"text": "設在道路旁的裝飾圖案。", "img": ""}, {"text": "重要公路的表示。", "img": ""}, {"text": "國道標誌圖案。", "img": ""}], "answer": "3"},

{"qid": 451, "text": "甲為自用小客車駕駛人，乙為營業大貨車職業駕駛人。兩人一年內均有2次闖紅燈紀錄，依115年新制，下列敘述何者正確？", "images": [], "options": [{"text": "甲、乙均已達三項指定違規之累計門檻，兩人皆須參加矯正防制班。", "img": ""}, {"text": "甲尚未達門檻暫免參加；乙因營業大型車適用較低門檻，須參加矯正防制班。", "img": ""}, {"text": "甲、乙門檻相同皆為3次，兩人目前均為2次，尚未達標，暫無須參加。", "img": ""}], "answer": "2"},

{"qid": 960, "text": "汽車駕駛人駕駛汽車肇事，無人受傷或死亡汽車尚能行駛，而不儘速將汽車位置標繪移置路邊，致妨礙交通者，處駕駛人新臺幣", "images": [], "options": [{"text": "600元以上1,800元以下", "img": ""}, {"text": "1,000元以上3,000元以下", "img": ""}, {"text": "1,200元以上3,600元以下罰鍰。", "img": ""}], "answer": "1"},
